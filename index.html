<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard SPIN BY OXXO · Plaza Oaxaca</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bg-glow" aria-hidden="true"></div>

<header>
  <div class="brand">
    <img class="logo-spin" src="spin-logo.svg" alt="SPIN">
    <div>
      <h1>Dashboards Ats</h1>
      <div class="sub">Seguimiento Spin por mes</div>
    </div>
  </div>
  <div class="nav-links">
    <a class="btn-inicio" href="spin-premia.html" title="Ir al dashboard de Avance Spin Premia">Spin Premia</a>
    <!-- placeholder: crea indicadores-generales.html en este mismo repo cuando exista ese dashboard -->
    <a class="btn-inicio" href="indicadores-generales.html" title="Ir al dashboard de indicadores generales">‹ Inicio</a>
  </div>
</header>

<section class="kpis" id="kpis"></section>

<div class="card">
  <div class="cardtop">
    <div>
      <div class="tabs">
        <button class="tab on" data-view="asesor">Por Asesor</button>
        <button class="tab" data-view="tienda">Por Tienda</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>
    <div class="tools">
      <select class="sortby" id="asesorFilter" hidden></select>
      <input class="search" id="buscar" type="search" placeholder="Buscar…" autocomplete="off">
      <select class="sortby" id="orden"></select>
    </div>
  </div>
  <div class="dist" id="dist"></div>
  <div id="alist"></div>
  <div class="empty" id="empty" hidden>Sin resultados con ese filtro.</div>
</div>

<footer>Datos en vivo desde Google Sheets «Tableros Spin» · hoja Tiendas, filtro Plaza 10VHT Oaxaca · Meta ~10.2/tienda.</footer>

<script src="sheet.js"></script>
<script src="app.js"></script>
</body>
</html>
