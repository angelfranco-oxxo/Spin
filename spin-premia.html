<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avance Spin Premia · Plaza Oaxaca</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="premia.css">
</head>
<body>
<div class="bg-glow" aria-hidden="true"></div>

<header>
  <div class="brand">
    <img class="logo-spin" src="spin-logo.svg" alt="SPIN">
    <div>
      <h1>Dashboards Ats</h1>
      <div class="sub">Avance Spin Premia · por mes</div>
    </div>
  </div>
  <div class="nav-links">
    <a class="btn-inicio" href="index.html" title="Ir al dashboard de Cuentas Nuevas">Cuentas Nuevas</a>
    <!-- placeholder: crea indicadores-generales.html en este mismo repo cuando exista ese dashboard -->
    <a class="btn-inicio" href="indicadores-generales.html" title="Ir al dashboard de indicadores generales">‹ Inicio</a>
  </div>
</header>

<section class="kpis kpis-4" id="kpis"></section>

<div class="card">
  <div class="cardtop">
    <div>
      <div class="tabs">
        <button class="tab mtab on" data-m="trafico">Tráfico</button>
        <button class="tab mtab" data-m="servicios">Servicios / Telefonía</button>
        <button class="tab mtab" data-m="afiliaciones">Afiliaciones</button>
      </div>
      <div class="hint">Ranking de asesores para la métrica seleccionada. Datos en vivo desde Sheets.</div>
    </div>
  </div>

  <div class="chart-wrap" id="chart"></div>

  <div class="cardtop">
    <div>
      <div class="tabs">
        <button class="tab vtab on" data-v="asesor">Por Asesor</button>
        <button class="tab vtab" data-v="tienda">Por Tienda</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>
    <div class="tools">
      <input class="search" id="buscar" type="search" placeholder="Buscar…" autocomplete="off">
    </div>
  </div>

  <div id="alist"></div>
  <div class="empty" id="empty" hidden>Sin resultados con ese filtro.</div>
</div>

<footer>Datos en vivo desde Google Sheets «Tableros Spin» · hoja Dashboard2 (Avance Spin Premia) · filtro Plaza 10VHT Oaxaca.</footer>

<script src="premia-sheet.js"></script>
<script src="premia.js"></script>
</body>
</html>
